server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Media lives in the minio "bsm-media" bucket (see docker-compose.yml /
  # MINIO_BUCKET) — keep this prefix in sync if that name ever changes.
  location /gallery/ {
    proxy_pass http://minio:9000/bsm-media/gallery/;
  }

  location /files/ {
    proxy_pass http://minio:9000/bsm-media/files/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
